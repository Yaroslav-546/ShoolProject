{% extends 'base.html' %}
{% block title %}Удаление обращения{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="card shadow-sm border-0 rounded-4 mx-auto" style="max-width: 500px;">
        <div class="card-body text-center p-4">
            <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
            <h4>Вы уверены, что хотите удалить обращение?</h4>
            <p><strong>{{ object.subject }}</strong><br>{{ object.created_at|date:"d.m.Y" }}</p>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex gap-2 justify-content-center">
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'feedback:user_detail' object.pk %}" class="btn btn-secondary">Отмена</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
