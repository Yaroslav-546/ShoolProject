{% extends 'base.html' %}
{% load static %}

{% block title %}Галерея{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link rel="stylesheet" href="{% static 'css/gallery.css' %}">
{% endblock %}

{% block content %}
<div class="carousel-container-main">
    <div class="carousel-container">
        <div class="carousel">
            <div class="progress-bar" id="progressBar"></div>
            <div class="carousel-track" id="carouselTrack"></div>

            <button class="carousel-btn btn-prev" id="prevBtn">
                <i class="bi bi-chevron-left"></i>
            </button>
            <button class="carousel-btn btn-next" id="nextBtn">
                <i class="bi bi-chevron-right"></i>
            </button>

            <div class="carousel-indicators" id="indicators"></div>
            <div class="slide-counter" id="slideCounter">1 / 5</div>
        </div>

        <div class="carousel-info">
            <p><i class="bi bi-info-circle"></i> Всего слайдов: <span id="totalSlides">0</span>
            | Автопрокрутка: <span id="autoStatus">Включена</span>
            | <i class="bi bi-arrows-fullscreen"></i> Нажмите на изображение для увеличения</p>
        </div>
    </div>
</div>

<script>
    const slidesData = [
        {% for img in images %}
        {
            image: "{{ img.image.url }}",
            description: "{{ img.description|default:img.title|escapejs }}"
        }{% if not forloop.last %},{% endif %}
        {% endfor %}
    ];

    class Carousel {
        constructor() {
            this.currentSlide = 0;
            this.totalSlides = slidesData.length;
            this.track = document.getElementById('carouselTrack');
            this.indicatorsContainer = document.getElementById('indicators');
            this.slideCounter = document.getElementById('slideCounter');
            this.totalSlidesElement = document.getElementById('totalSlides');
            this.progressBar = document.getElementById('progressBar');
            this.autoPlayInterval = null;
            this.autoPlayDelay = 10000;
            this.isAutoPlay = true;
            this.autoStatusElement = document.getElementById('autoStatus');
            this.touchStartX = 0;
            this.touchEndX = 0;
            this.swipeThreshold = 50;

            this.init();
            this.startAutoPlay();
        }

        init() {
            this.createSlides();
            this.createIndicators();
            this.updateCounter();
            this.addEventListeners();
            this.updateSlidePosition();
        }

        createSlides() {
            slidesData.forEach((slide, index) => {
                const slideElement = document.createElement('div');
                slideElement.className = `carousel-slide ${index === 0 ? 'active' : ''}`;
                slideElement.innerHTML = `
                    <a href="${slide.image}" data-fancybox="gallery" data-caption="${slide.description}" class="fancybox-link">
                        <img src="${slide.image}" alt="${slide.description}">
                    </a>
                    <div class="slide-content">
                        <p>${slide.description}</p>
                    </div>
                `;
                this.track.appendChild(slideElement);
            });
            this.totalSlidesElement.textContent = this.totalSlides;
        }

        createIndicators() {
            for (let i = 0; i < this.totalSlides; i++) {
                const indicator = document.createElement('div');
                indicator.className = `indicator ${i === 0 ? 'active' : ''}`;
                indicator.dataset.index = i;
                indicator.addEventListener('click', () => this.goToSlide(i));
                this.indicatorsContainer.appendChild(indicator);
            }
        }

        addEventListeners() {
            document.getElementById('prevBtn').addEventListener('click', () => this.prevSlide());
            document.getElementById('nextBtn').addEventListener('click', () => this.nextSlide());
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') this.prevSlide();
                if (e.key === 'ArrowRight') this.nextSlide();
                if (e.key === ' ') this.toggleAutoPlay();
            });
            this.track.addEventListener('touchstart', (e) => this.handleTouchStart(e));
            this.track.addEventListener('touchend', (e) => this.handleTouchEnd(e));
            this.track.addEventListener('mouseenter', () => this.pauseAutoPlay());
            this.track.addEventListener('mouseleave', () => this.resumeAutoPlay());
            this.track.addEventListener('click', (e) => {
                if (!e.target.closest('.fancybox-link')) {
                    this.toggleAutoPlay();
                }
            });
        }

        handleTouchStart(e) {
            this.touchStartX = e.changedTouches[0].screenX;
            this.pauseAutoPlay();
        }

        handleTouchEnd(e) {
            this.touchEndX = e.changedTouches[0].screenX;
            const swipeDistance = this.touchStartX - this.touchEndX;
            if (swipeDistance > this.swipeThreshold) this.nextSlide();
            else if (swipeDistance < -this.swipeThreshold) this.prevSlide();
            this.resumeAutoPlay();
        }

        updateSlidePosition() {
            const translateX = -this.currentSlide * 100;
            this.track.style.transform = `translateX(${translateX}%)`;
            document.querySelectorAll('.indicator').forEach((ind, idx) => {
                ind.classList.toggle('active', idx === this.currentSlide);
            });
            document.querySelectorAll('.carousel-slide').forEach((slide, idx) => {
                slide.classList.toggle('active', idx === this.currentSlide);
            });
            this.updateCounter();
            this.updateProgressBar();
        }

        updateCounter() {
            this.slideCounter.textContent = `${this.currentSlide + 1} / ${this.totalSlides}`;
        }

        updateProgressBar() {
            this.progressBar.style.width = '0%';
            setTimeout(() => this.progressBar.style.width = '100%', 10);
        }

        nextSlide() {
            this.currentSlide = (this.currentSlide + 1) % this.totalSlides;
            this.updateSlidePosition();
            this.resetAutoPlay();
        }

        prevSlide() {
            this.currentSlide = (this.currentSlide - 1 + this.totalSlides) % this.totalSlides;
            this.updateSlidePosition();
            this.resetAutoPlay();
        }

        goToSlide(index) {
            this.currentSlide = index;
            this.updateSlidePosition();
            this.resetAutoPlay();
        }

        startAutoPlay() {
            if (this.isAutoPlay && this.totalSlides) {
                this.autoPlayInterval = setInterval(() => this.nextSlide(), this.autoPlayDelay);
                this.autoStatusElement.textContent = 'Включена';
            }
        }

        pauseAutoPlay() {
            if (this.autoPlayInterval) {
                clearInterval(this.autoPlayInterval);
                this.autoPlayInterval = null;
            }
        }

        resumeAutoPlay() {
            if (this.isAutoPlay && !this.autoPlayInterval && this.totalSlides) {
                this.startAutoPlay();
            }
        }

        resetAutoPlay() {
            this.pauseAutoPlay();
            this.startAutoPlay();
        }

        toggleAutoPlay() {
            this.isAutoPlay = !this.isAutoPlay;
            if (this.isAutoPlay) this.startAutoPlay();
            else {
                this.pauseAutoPlay();
                this.autoStatusElement.textContent = 'Выключена';
            }
        }
    }

    // Инициализация, только если есть изображения
    document.addEventListener('DOMContentLoaded', () => {
        if (slidesData.length > 0) {
            new Carousel();
        } else {
            document.getElementById('carouselTrack').innerHTML = '<div class="carousel-slide"><div style="text-align:center; padding: 100px;">Нет изображений в галерее</div></div>';
            document.getElementById('totalSlides').textContent = '0';
        }
    });
</script>
{% endblock %}
