{% extends "admin/index.html" %}
{% load static %}

{% block extrahead %}
{{ block.super }}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
    .dashboard-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 30px;
    }

    .stat-card {
        background: var(--gray-50);
        border-radius: 16px;
        padding: 20px;
        text-align: center;
        border: 1px solid var(--gray-200);
        transition: all 0.3s ease;
    }

    .stat-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .stat-number {
        font-size: 2.5rem;
        font-weight: 800;
        background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .stat-label {
        color: #6b7280;
        font-size: 0.85rem;
        margin-top: 8px;
    }

    /* Отступ для блока последних действий */
    #content-related {
        margin-top: 30px;
    }

    /* Увеличение отступа между основными блоками */
    .module {
        margin-bottom: 30px;
    }
</style>
{% endblock %}

{% block content %}
<div id="content-main">
    {{ block.super }}
</div>
{% endblock %}
